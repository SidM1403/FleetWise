services:
  - type: web
    name: fleetwise-web
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: FleetWise
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: fleetwise-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: FORCE_HTTPS
        value: true

databases:
  - name: fleetwise-db
    databaseName: fleetwise
    user: fleetwise
    plan: free
